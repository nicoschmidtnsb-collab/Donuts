  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--primary:#2d1a0e;--accent:#e8612a;--light:#fff5ef;--muted:#9a7060;--card:#fff;--border:#e0d8d0;--err:#c0392b;--ok:#2e7d52}
    body{font-family:'DM Sans',sans-serif;background:#f9f5f0;color:#2d1a0e;min-height:100vh}
    .shell{max-width:480px;margin:0 auto;padding:1.5rem 1rem 3rem}
    .brand{text-align:center;margin-bottom:2rem}
    .brand h1{font-family:'Fraunces',serif;font-size:26px;font-weight:600;color:var(--primary);letter-spacing:-0.5px}

    .closed-banner{background:#fff3cd;border:0.5px solid #f0c040;border-radius:12px;padding:1rem;text-align:center;margin-bottom:1.5rem;font-size:13px;color:#7a5800;display:none}
    .closed-banner strong{display:block;font-size:15px;margin-bottom:4px}
    .step{background:var(--card);border:0.5px solid var(--border);border-radius:16px;padding:1.25rem;margin-bottom:1rem}
    .step.disabled{opacity:0.45;pointer-events:none}
    .step-header{display:flex;align-items:center;gap:10px;margin-bottom:1rem}
    .step-num{width:26px;height:26px;border-radius:50%;background:var(--primary);color:#fff;font-size:12px;font-weight:500;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .step-title{font-size:14px;font-weight:500;color:#666}
    .product-card{display:flex;align-items:center;gap:14px}
    .product-img{width:76px;height:76px;border-radius:12px;background:linear-gradient(135deg,#fde8d8,#fbbf9a);display:flex;align-items:center;justify-content:center;font-size:38px;flex-shrink:0}

    .product-price{font-size:20px;font-weight:500;color:var(--accent);margin-top:4px}
    .units-tag{font-size:11px;background:var(--light);color:var(--accent);border:0.5px solid rgba(232,97,42,0.3);border-radius:6px;padding:3px 8px;margin-top:6px;display:inline-block;font-weight:500}
    .qty-row{display:flex;align-items:center;justify-content:space-between;margin-top:1rem;padding-top:1rem;border-top:0.5px solid var(--border)}
    .qty-label{font-size:13px;color:var(--muted)}
    .qty-ctrl{display:flex}
    .qty-btn{width:34px;height:34px;border:0.5px solid #ccc;background:transparent;cursor:pointer;font-size:18px;color:var(--primary);display:flex;align-items:center;justify-content:center;transition:background .15s}
    .qty-btn:first-child{border-radius:8px 0 0 8px}
    .qty-btn:last-child{border-radius:0 8px 8px 0}
    .qty-btn:hover{background:var(--light)}
    .qty-num{width:40px;height:34px;border-top:0.5px solid #ccc;border-bottom:0.5px solid #ccc;border-left:none;border-right:none;text-align:center;font-size:15px;font-weight:500;color:var(--primary);background:transparent}
    .units-info{font-size:12px;color:var(--muted);text-align:right;margin-top:4px}
    .field{margin-bottom:12px}
    .field label{display:block;font-size:12px;font-weight:500;color:var(--muted);margin-bottom:4px}
    .field input,.field textarea{width:100%;padding:10px 12px;border:0.5px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--primary);background:#fff;outline:none;transition:border .15s}
    .field input:focus,.field textarea:focus{border-color:var(--accent)}
    .field input.err{border-color:var(--err)}
    .field input.ok{border-color:var(--ok)}
    .field textarea{resize:vertical;min-height:72px}
    .field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .comunas-hint{font-size:11px;color:var(--muted);margin-top:4px}
    .comunas-hint span{color:var(--accent);font-weight:500}
    .dir-feedback{font-size:12px;margin-top:4px;min-height:16px}
    .dir-feedback.ok{color:var(--ok)}
    .dir-feedback.err{color:var(--err)}
